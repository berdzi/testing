# Główna konfiguracja próby wstrzyknięcia rozszerzeń z poziomu właściwości YAML
config:
  validation: false # Wyłączamy walidację schematu, aby nie odrzuciła naszych niestandardowych flag

# Definiujemy sekcję dla wtyczek i próbujemy przetestować różne nazewnictwo flag CLI
# ponieważ niektóre integracje automatycznie mapują te klucze na parametry uruchomieniowe Javy
plugins:
  path: "./malicious-plugin.jar"
  classpath: "./malicious-plugin.jar"
  ruleset: "./malicious-plugin.jar"

custom-rules:
  active: true
  path: "./malicious-plugin.jar"

# Wymagane minimum, aby detekt uznał plik za poprawny i przeszedł do fazy inicjalizacji reguł
complexity:
  active: true
  LongMethod:
    active: true
    threshold: 60
